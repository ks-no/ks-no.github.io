baseURL = "/"
uglyurls = false

languageCode = "nb-no"
defaultContentLanguage = "no"

title = "KS Fiks"
theme = "hugo-theme-relearn"
themesdir = "themes"
[markup.highlight]
codeFences = true
style = "monokailight"

defaultContentLanguageInSubdir= false
enableMissingTranslationPlaceholders = false

preservetaxonomynames = true

# [Languages]
# [Languages.en]
# title = "Documentation for Hugo docDock"
# weight = 1
# languageName = "English"
# 
# [Languages.fr]
# title = "Documentation du thème docDock"
# weight = 2
# languageName = "Français"

enableGitInfo = true

#Ser ikke ut til å fungere
[frontmatter]
date = ["date","publishDate", "lastmod"]
lastmod = ["lastmod", "date", "publishDate"]
publishDate = [":git", "lastmod", "publishDate", "date"]
expiryDate = ["expiryDate"]

[markup.goldmark.renderer]
unsafe = true

[markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2

[params]
editURL = "https://github.com/ks-no/ks-no.github.io/edit/source/content/"
showVisitedLinks = false # default is false
themeVariant = ["ks-digital"]
collapsibleMenu = true # show chevrons in menu
alwaysopen = false # collapse menu on load
disableLandingPageButton = true
menushortcutsnewtab = false # set true to open shortcuts links to a new tab/window
enableGitInfo = true

[outputs]
home = [ "HTML", "RSS"]


[[menu.shortcuts]]
pre = "<h3>Lenker</h3>"
name = "Github repo"
identifier = "ds"
url = "https://github.com/ks-no/ks-no.github.io"
weight = 10

[[menu.shortcuts]]
name = "<img src='/images/feed-icon-28x28.png' aria-hidden='true'>&nbsp;RSS"
url = "/index.xml"
weight = 11
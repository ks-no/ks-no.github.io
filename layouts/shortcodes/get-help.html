{{- $email := .Get "email" -}}
{{- $support_page := .Get "support_page" -}}

<div style="background-color: #f5f5f5; border-left: 4px solid #0066cc; padding: 20px; margin: 30px 0; border-radius: 4px;">
  <h3 style="margin-top: 0; margin-bottom: 15px;">📞 Få hjelp</h3>

  <ul style="margin: 0; padding-left: 20px; list-style-type: none;">
    {{ if $email }}
    <li style="margin-bottom: 8px;">
      <strong>E-post:</strong>
      <a href="mailto:{{ $email }}">{{ $email }}</a>
    </li>
    {{ end }}

    {{ if $support_page }}
    <li style="margin-bottom: 8px;">
      <strong>Support-kanaler:</strong>
      <a href="{{ $support_page }}">Se oversikt over alle kanaler</a>
    </li>
    {{ end }}
  </ul>
</div>

tLength="185.5973" x="531.1055" y="1173.6364">Kartverket PersonServiceWS</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="44.4358" x="601.6863" y="1192.7043">(SOAP)</text></g><g class="participant participant-head" data-entity-uid="part4" data-qualified-name="Folkeregister" id="part4-head"><rect fill="#E2E2F0" height="52.1358" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="128.7576" x="733.7028" y="71"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.7576" x="740.7028" y="92.9659">Fiks Folkeregister</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.3196" x="742.9218" y="112.0339">(KS Digital, REST)</text></g><g class="participant participant-tail" data-entity-uid="part4" data-qualified-name="Folkeregister" id="part4-tail"><rect fill="#E2E2F0" height="52.1358" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="128.7576" x="733.7028" y="1151.6705"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.7576" x="740.7028" y="1173.6364">Fiks Folkeregister</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.3196" x="742.9218" y="1192.7043">(KS Digital, REST)</text></g><g><title>Matrikkel Proxy API</title><rect fill="#FFFFFF" height="650.6504" style="stroke:#181818;stroke-width:1;" width="10" x="302.513" y="329.784"/></g><g><title>Kartverket PersonServiceWS</title><rect fill="#FFFFFF" height="120.2361" style="stroke:#181818;stroke-width:1;" width="10" x="618.9042" y="487.314"/></g><g><title>Fiks Folkeregister</title><rect fill="#FFFFFF" height="49.412" style="stroke:#181818;stroke-width:1;" width="10" x="793.0816" y="702.6682"/></g><path d="M5,139.1358 L5,219.1358 L701,219.1358 L701,149.1358 L691,139.1358 L5,139.1358" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M691,139.1358 L691,149.1358 L701,149.1358 L691,139.1358" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.6071" x="223.7068" y="158.0328">Proxy av Kartverkets API:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.8892" x="223.7068" y="175.7389">- SOAP fra klient til KS Digital</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.8542" x="223.7068" y="193.4449">- SOAP fra KS Digital til Kartverket</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.2892" x="223.7068" y="211.1509">- REST mot Folkeregister for datautfylling</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="867.4604" x="0" y="246.8129"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="867.4604" y1="246.8129" y2="246.8129"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="867.4604" y1="249.8129" y2="249.8129"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2;" width="112.0851" x="377.6877" y="234.9599"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="94.7051" x="383.6877" y="252.8569">Request Phase</text><g class="message" data-entity-1="part1" data-entity-2="part2" id="msg1"><polygon fill="#181818" points="290.513,325.784,300.513,329.784,290.513,333.784,294.513,329.784" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:2;" x1="82.5328" x2="296.513" y1="329.784" y2="329.784"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.1972" x="89.5328" y="288.5629">1. SOAP: findPerson(personId)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.9802" x="89.5328" y="306.2689">Basic Auth (Username:Password)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198.9262" x="89.5328" y="323.975">WSDL: KS Digital Matrikkel Proxy</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="867.4604" x="0" y="359.637"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="867.4604" y1="359.637" y2="359.637"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="867.4604" y1="362.637" y2="362.637"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2;" width="208.0284" x="329.716" y="347.784"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="190.6484" x="335.716" y="365.681">Proxy Validates and Forwards</text><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg2"><line style="stroke:#181818;stroke-width:2;" x1="312.513" x2="354.513" y1="407.196" y2="407.196"/><line style="stroke:#181818;stroke-width:2;" x1="354.513" x2="354.513" y1="407.196" y2="420.196"/><line style="stroke:#181818;stroke-width:2;" x1="313.513" x2="354.513" y1="420.196" y2="420.196"/><polygon fill="#181818" points="323.513,416.196,313.513,420.196,323.513,424.196,319.513,420.196" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="130.8061" x="319.513" y="401.387">2. Validate Basic Auth</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg3"><polygon fill="#181818" points="606.9042,483.314,616.9042,487.314,606.9042,491.314,610.9042,487.314" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:2;" x1="312.513" x2="612.9042" y1="487.314" y2="487.314"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.1972" x="319.513" y="446.093">3. SOAP: findPerson(personId)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.6012" x="319.513" y="463.799">Basic Auth (videresend til Kartverket)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.3912" x="319.513" y="481.505">WSDL: matrikkelapi/wsapi/v1/PersonServiceWS</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg4"><polygon fill="#181818" points="323.513,603.5501,313.513,607.5501,323.513,611.5501,319.513,607.5501" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:2;stroke-dasharray:2,2;" x1="317.513" x2="622.9042" y1="607.5501" y2="607.5501"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="110.2401" x="329.513" y="513.2111">4. SOAP Response</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.0351" x="329.513" y="530.9171">Person object:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="120.0941" x="329.513" y="548.6231">- matrikkelPersonId</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="37.531" x="329.513" y="566.3291">- navn</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.7401" x="329.513" y="584.0351">- rolle (eier, fester, osv.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.7332" x="329.513" y="601.7411">- rettigheter p&#229; eiendommer</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="867.4604" x="0" y="637.4032"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="867.4604" y1="637.4032" y2="637.4032"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="867.4604" y1="640.4032" y2="640.4032"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2;" width="167.8519" x="349.8043" y="625.5501"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="150.4719" x="355.8043" y="643.4472">Data Enrichment Phase</text><g class="message" data-entity-1="part2" data-entity-2="part4" id="msg5"><polygon fill="#181818" points="781.0816,698.6682,791.0816,702.6682,781.0816,706.6682,785.0816,702.6682" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:2;" x1="312.513" x2="787.0816" y1="702.6682" y2="702.6682"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.8642" x="319.513" y="679.1532">5. REST: GET /folkeregister/person/{fnr}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216.0602" x="319.513" y="696.8592">for enrichment (navn, adresse, etc.)</text></g><g class="message" data-entity-1="part4" data-entity-2="part2" id="msg6"><polygon fill="#181818" points="323.513,748.0802,313.513,752.0802,323.513,756.0802,319.513,752.0802" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:2;stroke-dasharray:2,2;" x1="317.513" x2="797.0816" y1="752.0802" y2="752.0802"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="58.1881" x="329.513" y="728.5652">6. 200 OK</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107.1851" x="329.513" y="746.2712">Folkeregisterdata</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="867.4604" x="0" y="781.9332"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="867.4604" y1="781.9332" y2="781.9332"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="867.4604" y1="784.9332" y2="784.9332"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2;" width="121.8903" x="372.785" y="770.0802"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" l